apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "tl-test"
        vault.hashicorp.com/agent-inject-secret-test: "secret/data/test"
    spec:
      serviceAccountName: tl-test-sa
      containers:
        - name: sample
          image: nginx:latest
          ports:
            - containerPort: 80