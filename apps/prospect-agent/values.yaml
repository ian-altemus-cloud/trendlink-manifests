apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-rotator
  namespace: secret-rotator
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "tl-prospect-agent"
            vault.hashicorp.com/agent-inject-secret-aws: "secret/data/trendlink/aws-credentials"
        spec:
          serviceAccountName: ecr-rotator-sa
          restartPolicy: OnFailure
          volumes:
          - name: shared-token
            emptyDir: {}
          initContainers:
          - name: get-ecr-token
            image: amazon/aws-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              AWS_ACCESS_KEY_ID=$(grep -o 'access_key_id:[^ ]*' /vault/secrets/aws | cut -d: -f2)
              AWS_SECRET_ACCESS_KEY=$(grep -o 'secret_access_key:[^]]*' /vault/secrets/aws | cut -d: -f2)
              export AWS_ACCESS_KEY_ID
              export AWS_SECRET_ACCESS_KEY
              aws ecr get-login-password --region us-east-1 > /shared/ecr-token
            volumeMounts:
            - name: shared-token
              mountPath: /shared
          containers:
          - name: ecr-rotator
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              TOKEN=$(cat /shared/ecr-token)
              kubectl delete secret ecr-pull-secret --namespace=default --ignore-not-found
              kubectl create secret docker-registry ecr-pull-secret \
                --docker-server=307217365914.dkr.ecr.us-east-1.amazonaws.com \
                --docker-username=AWS \
                --docker-password=$TOKEN \
                --namespace=default
            volumeMounts:
            - name: shared-token
              mountPath: /shared