apiVersion: v1
kind: Namespace
metadata:
  name: secret-rotator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-rotator-sa
  namespace: secret-rotator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ecr-secret-rotator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ecr-secret-rotator
subjects:
  - kind: ServiceAccount
    name: ecr-rotator-sa
    namespace: secret-rotator
roleRef:
  kind: ClusterRole
  name: ecr-secret-rotator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-rotator
  namespace: secret-rotator
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject-file-aws: "aws.sh"
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "tl-prospect-agent"
            vault.hashicorp.com/agent-inject-secret-aws: "secret/data/trendlink/aws-credentials"
            vault.hashicorp.com/agent-inject-template-aws: |
              {{- with secret "secret/data/trendlink/aws-credentials" -}}
              export AWS_ACCESS_KEY_ID="{{ .Data.data.access_key_id }}"
              export AWS_SECRET_ACCESS_KEY="{{ .Data.data.secret_access_key }}"
              {{- end }}
        spec:
          serviceAccountName: ecr-rotator-sa
          restartPolicy: OnFailure
          containers:
          - name: ecr-rotator
            image: dtzar/helm-kubectl:3.14.2
            command:
              - /bin/sh
              - -c
              - |
                cat /vault/secrets/aws.sh
                echo "---"
                . /vault/secrets/aws.sh
                echo "KEY_ID: $AWS_ACCESS_KEY_ID"
                echo "SECRET_LENGTH: ${#AWS_SECRET_ACCESS_KEY}"