apiVersion: v1
kind: Namespace
metadata:
  name: secret-rotator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-rotator-sa
  namespace: secret-rotator
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "tl-prospect-agent"
    vault.hashicorp.com/agent-inject-secret-aws: "secret/trendlink/aws-credentials"
    vault.hashicorp.com/agent-inject-template-aws: |
      {{- with secret "secret/trendlink/aws-credentials" -}}
      export AWS_ACCESS_KEY_ID={{ .Data.data.access_key_id }}
      export AWS_SECRET_ACCESS_KEY={{ .Data.data.secret_access_key }}
      {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ecr-secret-rotator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ecr-secret-rotator
subjects:
  - kind: ServiceAccount
    name: ecr-rotator-sa
    namespace: secret-rotator
roleRef:
  kind: ClusterRole
  name: ecr-secret-rotator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-rotator
  namespace: secret-rotator
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            vault.hashicorp.com/agent-inject: "true"
            vault.hashicorp.com/role: "tl-prospect-agent"
            vault.hashicorp.com/agent-inject-secret-aws: "secret/trendlink/aws-credentials"
            vault.hashicorp.com/agent-inject-template-aws: |
              {{- with secret "secret/trendlink/aws-credentials" -}}
              export AWS_ACCESS_KEY_ID={{ .Data.data.access_key_id }}
              export AWS_SECRET_ACCESS_KEY={{ .Data.data.secret_access_key }}
              {{- end }}
        spec:
          serviceAccountName: ecr-rotator-sa
          restartPolicy: OnFailure
          containers:
          - name: ecr-rotator
            image: amazon/aws-cli:latest
            command:
              - /bin/sh
              - -c
              - |
                AWS_ACCESS_KEY_ID=$(grep -o 'access_key_id:[^ ]*' /vault/secrets/aws | cut -d: -f2)
                AWS_SECRET_ACCESS_KEY=$(grep -o 'secret_access_key:[^ ]*' /vault/secrets/aws | cut -d: -f2)
                export AWS_ACCESS_KEY_ID
                export AWS_SECRET_ACCESS_KEY
                TOKEN=$(aws ecr get-login-password --region us-east-1)
                kubectl delete secret ecr-pull-secret --namespace=default --ignore-not-found
                kubectl create secret docker-registry ecr-pull-secret \
                  --docker-server=307217365914.dkr.ecr.us-east-1.amazonaws.com \
                  --docker-username=AWS \
                  --docker-password=$TOKEN \
                  --namespace=default
